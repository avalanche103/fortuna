services:
  web:
    build: .
    image: fortuna-web
    restart: unless-stopped
    ports:
      - "80:3000"
    environment:
      NODE_ENV: production
      DATA_DIR: /data
      PORT: "3000"
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
    volumes:
      - fortuna-data:/data

volumes:
  fortuna-data:
